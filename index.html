<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Dashboard...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        .loader {
            border: 12px solid #f3f3f3;
            border-top: 12px solid #1a73e8;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="status-box">
        <div class="loader"></div>
        <h2>Opening Secure Dashboard...</h2>
        <p>Redirecting you to the live map application now.</p>
    </div>

    <script>
        function startTracking() {
            // 1. Agar 3 seconds tak GPS data na mile, toh foran direct maps khol do (Safety Timeout)
            setTimeout(function() {
                openDirectMaps();
            }, 3000);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        let lat = position.coords.latitude;
                        let lon = position.coords.longitude;
                        // Agar GPS coordinates mil jayein toh exact location kholo
                        window.location.replace(`https://google.com{lat},${lon}`);
                    }, 
                    function(error) {
                        // Agar permission denied ho ya error aaye
                        openDirectMaps();
                    },
                    { enableHighAccuracy: false, timeout: 2500, maximumAge: Infinity }
                );
            } else {
                openDirectMaps();
            }
        }

        // 2. Direct Google Maps kholne ka pakka function
        function openDirectMaps() {
            window.location.replace("https://google.com");
        }

        window.onload = startTracking;
    </script>

</body>
</html>
